<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#0b0f14;color:#e8edf2;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;min-height:100dvh}
.safe-top{height:env(safe-area-inset-top,20px);background:#0b0f14}
.header{background:#0b0f14ee;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid #ffffff10;padding:12px 16px;position:sticky;top:0;z-index:100}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.logo{width:34px;height:34px;border-radius:8px;object-fit:cover}
.app-title{font-size:17px;font-weight:800;letter-spacing:-0.02em;color:#00d4aa}
.header-btns{display:flex;gap:6px}
.hbtn{background:rgba(0,212,170,0.1);border:1px solid rgba(0,212,170,0.3);color:#00d4aa;padding:5px 12px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer}
.hbtn.blue{background:rgba(91,141,238,0.1);border-color:rgba(91,141,238,0.3);color:#5b8dee}
.last-upd{font-size:10px;color:#555;text-align:center;padding:2px 0}
.tabs{display:flex;gap:0}
.tab{flex:1;text-align:center;padding:9px 0;font-size:13px;font-weight:600;color:#555;cursor:pointer;border-bottom:2px solid transparent}
.tab.active{color:#00d4aa;border-bottom-color:#00d4aa}
.content{padding:12px 14px 100px}
.day-hdr{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:#555;margin:14px 0 7px;padding-bottom:5px;border-bottom:1px solid #ffffff08}
.day-hdr.today{color:#00d4aa}
.ecard{background:#1a1f27;border:1px solid #2a2f3a;border-radius:12px;padding:13px;margin-bottom:8px}
.ecard.group{border-left:3px solid #00d4aa}
.ecard.private{border-left:3px solid #a78bfa}
.ecard.meeting{border-left:3px solid #e879a0}
.etype{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:5px}
.etype.group{color:#00d4aa}.etype.private{color:#a78bfa}.etype.meeting{color:#e879a0}
.ename{font-size:15px;font-weight:700;margin-bottom:3px}
.edetail{font-size:12px;color:#888;margin-bottom:2px}
.ecoach{font-size:11px;color:#555;margin-top:5px}
.cpill{display:inline-block;padding:2px 7px;border-radius:8px;font-size:10px;font-weight:600;background:rgba(0,212,170,0.1);color:#00d4aa;border:1px solid rgba(0,212,170,0.2)}
.btn-row{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.mbtn{padding:7px 12px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid;flex:1;text-align:center}
.mbtn.athlete{background:rgba(91,141,238,0.1);border-color:rgba(91,141,238,0.3);color:#5b8dee}
.mbtn.invite{background:rgba(167,139,250,0.1);border-color:rgba(167,139,250,0.3);color:#a78bfa}
.mbtn.coach{background:rgba(0,212,170,0.1);border-color:rgba(0,212,170,0.3);color:#00d4aa}
.modal{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:200;display:flex;align-items:flex-end}
.sheet{background:#1a1f27;border-radius:20px 20px 0 0;width:100%;max-height:85vh;overflow-y:auto;padding:16px 18px calc(16px + env(safe-area-inset-bottom,0px))}
.handle{width:36px;height:4px;background:#2a2f3a;border-radius:2px;margin:0 auto 14px}
.sheet-title{font-size:16px;font-weight:700;margin-bottom:12px}
.msg-text{font-family:-apple-system,sans-serif;font-size:13px;line-height:1.7;color:#c8d0dc;background:#161b22;border-radius:10px;padding:14px;white-space:pre-wrap;word-break:break-word;border:1px solid #2a2f3a;margin-bottom:14px}
.sbtn-row{display:flex;gap:8px}
.sbtn-copy{flex:1;padding:13px;border-radius:10px;background:#a78bfa;color:#0b0f14;font-size:14px;font-weight:700;border:none;cursor:pointer}
.sbtn-close{padding:13px 18px;border-radius:10px;background:transparent;color:#888;font-size:14px;border:1px solid #2a2f3a;cursor:pointer}
.empty{text-align:center;padding:60px 20px;color:#555;font-size:14px}

.m-col-day{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:#888}
.m-col-date{font-size:13px;font-weight:800}
.m-col-date.today{color:#00d4aa}
.m-slot{height:28px;border-bottom:1px solid #1e2330}
.m-slot.half{border-bottom-style:dashed;border-bottom-color:#161b22}
.m-ev{position:absolute;left:2px;right:2px;border-radius:4px;padding:2px 4px;overflow:hidden;z-index:2}
.m-ev-name{font-size:9px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.m-ev-time{font-size:8px;opacity:0.75}
.now-line{position:absolute;left:0;right:0;height:2px;background:#f06060;z-index:5;border-radius:1px}
.cbadge{display:inline-block;background:rgba(0,212,170,0.12);color:#00d4aa;font-size:10px;font-weight:600;padding:1px 6px;border-radius:7px;margin-left:5px}

<script>
const GIST_URL='https://gist.githubusercontent.com/mize77/57fe1173e91ff569c66fb4af80287def/raw/mize_schedule.json';
const HS=8,HE=22,SH=28,SLOTS=(HE-HS)*2;
let data=null,tab='list',curMsg='';

function ldk(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function sdk(s){if(!s)return'';const d=(typeof s==='string'&&s.length===10)?new Date(s+'T00:00:00'):new Date(s);return ldk(d)}
function ft(t){if(!t)return'';try{const[h,m]=t.split(':').map(Number);return(h%12||12)+':'+(String(m).padStart(2,'0'))+(h>=12?' PM':' AM');}catch{return t}}
function fdl(s){const d=(typeof s==='string'&&s.length===10)?new Date(s+'T00:00:00'):new Date(s);return d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'})}
function fds(s){const d=(typeof s==='string'&&s.length===10)?new Date(s+'T00:00:00'):new Date(s);return d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}

// Get athlete display name — nickname first, then first name only
function athName(a){
  if(!a) return '';
  if(a.nickname && a.nickname.trim()) return a.nickname.trim();
  if(a.name) return a.name.split(' ')[0];
  return (a.firstname||'').trim();
}
function parentName(a){
  if(!a) return '';
  const full = a.parentName||athName(a);
  return full.split(' ')[0];
}

async function loadData(){
  try{
    const r=await fetch(GIST_URL+'?t='+Date.now());
    data=await r.json();
    document.getElementById('last-upd').textContent='Updated '+new Date(data.savedAt||Date.now()).toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'});
    render();
  }catch(e){
    document.getElementById('content').innerHTML='<div class="empty">Could not load. Check connection and refresh.</div>';
  }
}

function switchTab(t,el){tab=t;document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));el.classList.add('active');render();}
function render(){if(!data)return;tab==='list'?renderList():renderMatrix();}

function days7(){const now=new Date(),days=[];for(let i=0;i<7;i++){const d=new Date(now);d.setDate(now.getDate()+i);days.push(d);}return days;}
function days3(){const now=new Date(),days=[];for(let i=0;i<3;i++){const d=new Date(now);d.setDate(now.getDate()+i);days.push(d);}return days;}

function getEvs(dk){
  const evs=[];
  const athletes=data.athletes||[],coaches=data.coaches||[];
  // Club → region mapping for proximity matching
  const CLUB_REGION = {
    // Orange County
    'newport beach wpc':'oc','set wpc':'oc','vanguard aquatics':'oc','rancho tsunami':'oc',
    'mission wpc':'oc','corona del mar':'oc','corona del mar wpc':'oc','laguna beach wpc':'oc',
    'laguna beach hs':'oc','hieland wpc':'oc','hielan wpc':'oc','patriot wpc':'oc',
    'san clemente wpc':'oc','lake elsinore wpc':'oc','ngen':'oc','southcoast wpc':'oc',
    'supreme wpc':'oc','908 wpc':'oc','aetos wpc':'oc','socal':'oc',
    // San Diego
    'san diego shores':'sd','san diego dons':'sd','del mar wpc':'sd','carlsbad wpc':'sd',
    'coronado wpc':'sd','la jolla united':'sd','chawp':'sd','olympus aquatics':'sd',
    // Manhattan Beach / LA
    'trojan wpc':'mb','rosebowl aquatics':'mb','long beach shore':'mb','long beach vikings':'mb',
    'palos verdes / torjan wpc':'mb','la premier':'mb','st. joseph hs / long beach shore':'mb',
    // NorCal
    'stanford wpc':'norcal','sacred heart hs / stanford wpc':'norcal',
    // Route 66 / Inland
    'route 66':'oc',
  };

  function sessionRegion(poolStr) {
    const p = (poolStr||'').toLowerCase();
    if(p.includes('jake')||p.includes('san diego')||p.includes('coronado')) return 'sd';
    if(p.includes('mara')||p.includes('manhattan')||p.includes('mb')) return 'mb';
    if(p.includes('mize')||p.includes('huntington')||p.includes('estancia')||p.includes('golden west')||p.includes('orange')) return 'oc';
    if(p.includes('harvard westlake')||p.includes('la ')||p.includes('trojan')) return 'mb';
    return '';
  }

  function athleteRegion(a) {
    const r = (a.region||'').toLowerCase();
    if(r.includes('san diego')) return 'sd';
    if(r.includes('manhattan')) return 'mb';
    if(r.includes('orange')||r.includes('anaheim')||r.includes('huntington')) return 'oc';
    if(r.includes('norcal')||r.includes('north los')) return 'norcal';
    // Fall back to club
    const c = (a.club||'').toLowerCase();
    return CLUB_REGION[c] || '';
  }

  function athleteScore(a, sessRegion, isHP) {
    const ar = athleteRegion(a);
    const regionMatch = ar && sessRegion && ar === sessRegion;
    const hpMatch = isHP && a.level === 'High Performance';
    // Tier 0: region match + HP (for HP sessions)
    if(regionMatch && hpMatch) return 0;
    // Tier 1: region match only
    if(regionMatch) return 1;
    // Tier 2: HP match but wrong region (for HP sessions)
    if(hpMatch) return 2;
    // Tier 3: everyone else
    return 3;
  }

  (data.programs||[]).forEach(prog=>{
    (prog.dates||[]).forEach(d=>{
      if(sdk(d.date)!==dk)return;
      const lc=coaches.find(c=>c.id===(d.leadCoachId||'mize_master_001'))||coaches.find(c=>c.isDefault)||coaches[0];
      const attending = (d.attendees||[]).map(id=>athletes.find(a=>a.id===id)).filter(Boolean);
      const isHP = prog.level==='High Performance';
      const poolStr = d.location||prog.location||'';
      const sessRegion = sessionRegion(poolStr);
      attending.sort((a,b)=>{
        const sa=athleteScore(a,sessRegion,isHP), sb=athleteScore(b,sessRegion,isHP);
        if(sa!==sb) return sa-sb;
        return (athName(a)||'').localeCompare(athName(b)||'');
      });
      // Tag each athlete with their tier for collapsible display
      attending.forEach(a=>{ a._tier = athleteScore(a,sessRegion,isHP); });
      evs.push({kind:'group',id:d.id,name:prog.name,level:prog.level,startTime:d.startTime||prog.startTime||'',endTime:d.endTime||prog.endTime||'',location:d.location||prog.location||'',address:d.address||prog.address||'',date:d.date,count:attending.length,prog,occ:{...d,_sortedAttendees:attending.map(a=>a.id)},lc,isRemote:false,_attending:attending,_sessRegion:sessRegion,_isHP:isHP});
    });
  });
  (data.privateSessions||[]).forEach(s=>{
    if(sdk(s.date)!==dk)return;
    const a1=athletes.find(a=>a.id===s.athleteId),a2=s.athlete2Id?athletes.find(a=>a.id===s.athlete2Id):null;
    const nm=[athName(a1),athName(a2)].filter(Boolean).join(' + ');
    const lc=coaches.find(c=>c.id===(s.leadCoachId||'mize_master_001'))||coaches.find(c=>c.isDefault)||coaches[0];
    evs.push({kind:'private',id:s.id,name:nm||'Private Session',type:s.type||'Private Session',startTime:s.time||'',endTime:s.endTime||'',location:s.poolName||'',address:s.poolAddress||'',date:s.date,session:s,lc,isRemote:(s.poolName||'').toLowerCase().includes('zoom')||(s.type||'').toLowerCase().includes('remote')});
  });
  (data.meetings||[]).forEach(m=>{
    if(m.date!==dk)return;
    const a=athletes.find(x=>x.id===m.athleteId);
    const tl=m.meetingType==='Other'?m.otherType:m.meetingType;
    const lc=coaches.find(c=>c.id===(m.leadCoachId||'mize_master_001'))||coaches.find(c=>c.isDefault)||coaches[0];
    evs.push({kind:'meeting',id:m.id,name:(athName(a)||'Meeting')+' — '+tl,startTime:m.time||'',location:m.location||'',date:m.date,meeting:m,lc,isRemote:m.meetingType==='Zoom Meeting'});
  });
  return evs.sort((a,b)=>(a.startTime||'99:99').localeCompare(b.startTime||'99:99'));
}

// ── Per-athlete message modal ─────────────────────────────────
let modalEvs = [];  // athletes/targets for current modal
let modalIdx = 0;   // currently selected athlete index
let modalType = ''; // 'confirm' | 'invite' | 'coach'
let modalEvRef = null; // the event

function showAthleteModal(type, ev) {
  modalType = type;
  modalEvRef = ev;
  const athletes = data.athletes||[];

  if(type==='coach') {
    const msg = buildCoach(ev);
    const coaches = data.coaches||[];
    const src = ev.occ||ev.session||ev.meeting||{};
    const lead = coaches.find(c=>c.id===(src.leadCoachId||'mize_master_001'))||coaches.find(c=>c.isDefault)||coaches[0];
    showMsg('Coach Confirmation', msg, getCoachPhone(lead));
    return;
  }

  if(type==='confirm'||type==='invite') {
    if(ev.kind==='group') {
      const occ = ev.occ, prog = ev.prog;
      if(type==='confirm') {
        modalEvs = ev._attending || (ev.occ.attendees||[]).map(id=>athletes.find(a=>a.id===id)).filter(Boolean);
        if(!modalEvs.length){showMsg('Athlete Confirmation','No athletes registered yet.');return;}
      } else {
        // invite — athletes NOT attending, sorted by tier
        const attending = new Set(occ.attendees||[]);
        const candidates = athletes.filter(a=>a.active!==false&&!attending.has(a.id));
        const sessRegion = ev._sessRegion||'';
        const isHP2 = ev._isHP||false;
        candidates.sort((a,b)=>{
          const sa=athleteScore(a,sessRegion,isHP2), sb=athleteScore(b,sessRegion,isHP2);
          if(sa!==sb) return sa-sb;
          return (athName(a)||'').localeCompare(athName(b)||'');
        });
        modalEvs = candidates;
        if(!modalEvs.length){showMsg('Athlete Invitation','All eligible athletes already registered.');return;}
      }
    } else if(ev.kind==='private') {
      const s = ev.session;
      const a1 = athletes.find(a=>a.id===s.athleteId);
      const a2 = s.athlete2Id ? athletes.find(a=>a.id===s.athlete2Id) : null;
      modalEvs = [a1,a2].filter(Boolean);
    } else if(ev.kind==='meeting') {
      const a = athletes.find(x=>x.id===ev.meeting.athleteId);
      modalEvs = [a].filter(Boolean);
    }
  }

  modalIdx = 0;
  renderAthleteModal();
  document.getElementById('modal').style.display='flex';
}

// Get best phone number for SMS — parent phone first, then athlete phone
function getBestPhone(a) {
  if(!a) return '';
  // Priority: parent phone first, then athlete phone
  const raw = a.parentPhone || a.parentphone || a.parentMobile || a.phone || a.mobile || '';
  return raw.replace(/\D/g,'');
}
function getCoachPhone(c) {
  if(!c) return '';
  return (c.phone||'').replace(/\D/g,'');
}
function smsUrl(phone, msg) {
  // Always open Messages — with recipient if phone exists, without if not
  if(phone) return 'sms:+1'+phone+'&body='+encodeURIComponent(msg);
  return 'sms:&body='+encodeURIComponent(msg);
}

function renderAthleteModal() {
  const a = modalEvs[modalIdx];
  const title = modalType==='confirm'?'Athlete Confirmation':'Athlete Invitation';
  const msg = modalType==='confirm' ? buildConfirmForAthlete(a, modalEvRef) : buildInviteForAthlete(a, modalEvRef);

  // Selector tabs if multiple athletes
  let tabs = '';

    tabs = '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">'
      + modalEvs.map((ath,i)=>`<button onclick="selectAthlete(${i})" style="padding:5px 12px;border-radius:16px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid;${i===modalIdx?'background:rgba(91,141,238,0.2);border-color:#5b8dee;color:#5b8dee':'background:transparent;border-color:#2a2f3a;color:#666'}">${athName(ath)}</button>`).join('')
      + '</div>';
  }

  // SMS button — always show
  const phone = getBestPhone(a);
  const smsLabel = phone ? 'Open in Messages' : 'Open in Messages';

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function poolNote(locationStr) {
  const loc = (locationStr||'').toLowerCase();
  if(loc.includes('jake')) return " There is an additional fee of $20 for the host of the pool that you can pay directly to me by Venmo to @MIZE77.";
  if(loc.includes('mara')) return "\n\n- Park on 35th St (by citrus trees)\n- There is a gate into the pool area that may be open - if not, the code is 1972\n";
  return '';
}

function buildConfirmForAthlete(a, ev) {
  if(!a) return '';
  const parent = parentName(a), goalie = athName(a);
  if(ev.kind==='group') {
    const occ=ev.occ, prog=ev.prog;
    const ts=occ.startTime?ft(occ.startTime)+(occ.endTime?' - '+ft(occ.endTime):''):'';
    const loc=[occ.location||prog.location,occ.address||prog.address].filter(Boolean).join(', ');
    const isPkg=(occ.pkgAttendees||[]).includes(a.id);
    const isPaid=isPkg||(occ.paidAttendees||[]).includes(a.id);
    const fee=prog.sessionFee||175;
    const unpaid=!isPaid?'\n\nPlease venmo the fee of $'+fee+' to my account @MIZE77 to reserve the time slot.':'';
    const pNote=poolNote(occ.location||prog.location);
    return'Hi '+parent+', this is to confirm the participation of '+goalie+' in the goalie session on '+fdl(occ.date)+(ts?' at '+ts:'')+(loc?' at '+loc:'')+'.'+pNote+unpaid+'\n\nSee you there!\nMIZE';
  }
  if(ev.kind==='private') {
    const s=ev.session;
    const ts=s.time?ft(s.time)+(s.endTime?' - '+ft(s.endTime):''):'';
    const loc=[s.poolName,s.poolAddress].filter(Boolean).join(', ');
    const unpaid=!s.paid&&(s.totalFee||s.fee)?'\n\nPlease venmo the fee of $'+(s.totalFee||s.fee)+' to my account @MIZE77 to reserve the time slot.':'';
    const pNote=poolNote(s.poolName);
    return'Hi '+parent+', this is to confirm the participation of '+goalie+' in the '+(s.type||'session')+' on '+fdl(s.date)+(ts?' at '+ts:'')+(loc?' at '+loc:'')+'.'+pNote+unpaid+'\n\nSee you there!\nMIZE';
  }
  if(ev.kind==='meeting') {
    const m=ev.meeting;
    const tl=m.meetingType==='Other'?m.otherType:m.meetingType;
    const ts=m.time?ft(m.time):'';
    const unpaid=!m.isFree&&m.fee?'\n\nPlease venmo the fee of $'+m.fee+' to my account @MIZE77 to reserve the time slot.':'';
    return'Hi '+parent+',\n\nThis is to confirm our '+tl+' on '+fdl(m.date)+(ts?' at '+ts:'')+(m.location?' at '+m.location:'')+'.'+(m.topics?'\n\nTopics:\n'+m.topics.split(/[\n,]+/).map(t=>t.trim()).filter(Boolean).map(t=>'- '+t).join('\n'):'')+unpaid+'\n\nBest greetings, MIZE';
  }
  return '';
}

function buildInviteForAthlete(a, ev) {
  if(!a||ev.kind!=='group') return buildConfirmForAthlete(a,ev);
  const prog=ev.prog, occ=ev.occ;
  const ts=occ.startTime?ft(occ.startTime)+(occ.endTime?' - '+ft(occ.endTime):''):'';
  const loc=[occ.location||prog.location,occ.address||prog.address].filter(Boolean).join(', ');
  const goalie=athName(a), parent=parentName(a);
  const hasPkg=a.packageRemaining>0;
  const fee=prog.sessionFee||175;
  const feeSection=hasPkg
    ?'You still have '+a.packageRemaining+' session'+(a.packageRemaining!==1?'s':'')+' left with your Goalie Performance Package. If '+goalie+' would like to join this session please text me to reserve the spot and I will confirm by text if it is still available.'
    :'If '+goalie+' would like to participate please sign up online at www.theperfectgoalie.com. The fee is $'+fee+' per session.';
  const pNote=poolNote(occ.location||prog.location);
  return'Hi '+parent+', I hope you are doing well. My next '+prog.name+' will be on '+fdl(occ.date)+(ts?' at '+ts:'')+(loc?' at '+loc:'')+'. '+feeSection+pNote+'\n\nBest greetings, MIZE';

function buildCoach(ev){
  const coaches=data.coaches||[];
  const src=ev.occ||ev.session||ev.meeting||{};
  const allIds=[src.leadCoachId||'mize_master_001',...(src.assistantCoachIds||[])].filter(Boolean);
  const allC=allIds.map(id=>coaches.find(c=>c.id===id)).filter(Boolean);
  if(!allC.length)return'';
  const names=allC.map(c=>c.nickname||c.firstname||'Coach').join(', ');
  const ts=ev.startTime?ft(ev.startTime)+(ev.endTime?' - '+ft(ev.endTime):''):'';
  const loc=[ev.location,ev.address].filter(Boolean).join(', ');
  const det=[fdl(ev.date),ts,loc,ev.name].filter(Boolean).join(' · ');
  const pl=!ev.isRemote?'\n\nPlease try to be present already 5-10 minutes before the start of the session and make sure that you are leaving the location as organized and a little bit cleaner as before.':'';
  return'Hi '+names+',\n\nThis is to confirm your coaching assignment for the following session:\n\n'+det+pl+'\n\nThank you and see you there!\nMIZE';
}

function tts(t){if(!t)return null;const[h,m]=t.split(':').map(Number);return(h-HS)*2+(m>=30?1:0);}
function ds(s,e){if(!s||!e)return 2;const[sh,sm]=s.split(':').map(Number),[eh,em]=e.split(':').map(Number);return Math.max(1,Math.round(((eh*60+em)-(sh*60+sm))/30));}

function renderMatrix(){
  const now=new Date(),todayKey=ldk(now);
  const DS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const MS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const CC={group:'#00d4aa',private:'#a78bfa',meeting:'#e879a0'};
  let all=[],html='<div class="matrix-wrap"><div class="matrix-grid">';
  html+='<div class="m-times">';
  for(let i=0;i<SLOTS;i++){const h=HS+Math.floor(i/2),ih=i%2===0;const h12=h>12?h-12:(h===0?12:h),ap=h>=12?'PM':'AM';html+=`<div class="m-tslot">${ih?`<span class="m-tlabel">${h12}${ap}</span>`:''}</div>`;}
  html+='</div>';
  days7().forEach((day,ci)=>{
    const dk=ldk(day),isT=dk===todayKey,evs=getEvs(dk);
    const ei=all.length;evs.forEach(e=>all.push(e));
    html+=`<div class="m-col"><div class="m-col-hdr"><div class="m-col-day">${isT?'TODAY':DS[day.getDay()]}</div><div class="m-col-date ${isT?'today':''}">${MS[day.getMonth()]} ${day.getDate()}</div></div><div style="position:relative">`;
    for(let i=0;i<SLOTS;i++)html+=`<div class="m-slot${i%2!==0?' half':''}"></div>`;
    if(isT){const ns=(now.getHours()-HS)*2+(now.getMinutes()>=30?1:0);if(ns>=0&&ns<SLOTS){const top=ns*SH+(now.getMinutes()%30/30)*SH;html+=`<div class="now-line" style="top:${top}px"></div>`;}}
    evs.forEach((ev,i)=>{
      const sl=tts(ev.startTime);if(sl===null||sl<0||sl>=SLOTS)return;
      const dur=ev.endTime?ds(ev.startTime,ev.endTime):2;
      const top=sl*SH+1,h=Math.max(SH,dur*SH)-2,c=CC[ev.kind]||'#888',gi=ei+i;
      html+=`<div class="m-ev" style="top:${top}px;height:${h}px;background:${c}22;border-left:3px solid ${c}" onclick="showEvDetail(${gi})"><div class="m-ev-name" style="color:${c}">${ev.name}</div>${ev.startTime?`<div class="m-ev-time" style="color:${c}">${ft(ev.startTime)}</div>`:''}</div>`;
    });
    html+='</div></div>';
  });
  html+='</div></div>';
  document.getElementById('content').innerHTML=html;
  window._evs=all;
}

function showEvDetail(idx){
  const ev=window._evs[idx];if(!ev)return;
  showAthleteModal('confirm',ev);
}

loadData();
setInterval(loadData,5*60*1000);
</script>
</body>
